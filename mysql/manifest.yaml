apiVersion: v1
kind: Service 
metadata:
  name: mysql
  namespace: roboshop
spec:  
  selector:
    project: roboshop
    component: mysql
    environment: dev
    tier: db
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: roboshop
spec:
  clusterIP: None
  selector:
    project: roboshop
    component: mysql
    environment: dev
    tier: db
  ports:
    - port: 3306
      targetPort: 3306
---                

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    component: mysql
    environment: dev
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: mysql
      environment: dev
      tier: db
  template:
    metadata:
      labels:
          project: roboshop
          component: mysql
          environment: dev
          tier: db
    spec:
      containers:
      - name: mysql
        image: narayanareddy2026/mysql:v1
        imagePullPolicy: Always
        volumeMounts:
        - name: mysql
          mountPath: /var/lib/mysql 
  volumeClaimTemplates:
  - metadata: 
      name: mysql
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi        

